<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Evento BB</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- CSS do projeto -->
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

<header>
    <img src="assets/img/Logo GZC.png" alt="Logo BB">
    <h1>Evento Banco do Brasil</h1>
</header>

<div class="intro">
    Vamos juntos! Prepare-se para um dia de muito conteúdo, aprendizado e integração.
</div>

<h2 class="section-title">Programação</h2>

<div id="carouselEventos" class="carousel slide container" data-bs-ride="false">
    <div class="carousel-inner" id="carousel-content">
        <!-- Conteúdo será carregado dinamicamente -->
    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#carouselEventos" data-bs-slide="prev">
        <div class="arrow-btn"><i class="bi bi-arrow-left"></i></div>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#carouselEventos" data-bs-slide="next">
        <div class="arrow-btn"><i class="bi bi-arrow-right"></i></div>
    </button>
</div>


<a class="btn-form" href="https://docs.google.com/forms/d/e/1FAIpQLSf5gsvDMj-xXutrh_rArBs5otdJBCej2UcXKzMxR29UnKy9tg/viewform?usp=header" target="_blank">
    Confirmar Participação
</a>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>

</body>
</html>
